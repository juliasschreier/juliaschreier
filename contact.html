<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Julia Schreier</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background-color: #f4f4f4;
    color: #111;
    line-height: 1.6;
}

.container {
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
}

/* Navigation */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 40px 0;
}

.logo img {
    width: 30%;
}

.nav-links a {
    text-decoration: none;
    color: #f19215;
    margin-left: 30px;
    font-size: 17px;
    font-weight: 300;
    transition: opacity 0.3s ease;
}

.nav-links a:hover {
    opacity: 0.5;
}

/* Contact Section */
.contact {
    margin-left: 150px;
    padding: 100px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
}

.contact h1 {
    font-size: 48px;
    font-weight: 200;
    color: #555;
    margin-bottom: 20px;
}

.contact p {
    color: #666;
    margin-bottom: 30px;
    max-width: 400px;
}

/* Contact info */
.contact-info p {
    margin-bottom: 10px;
}

/* Form */
form {
    margin-left: -100px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 500px;
}

input,
textarea {
    padding: 14px;
    border: 1px solid #ddd;
    font-size: 15px;
    font-family: inherit;
    background: white;
}

textarea {
    min-height: 140px;
    resize: vertical;
}

button {
    padding: 14px;
    border: none;
    background-color: #f19215;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.3s ease;
}

button:hover {
    opacity: 0.8;
}

/* Footer */
footer {
    padding: 40px 0;
    text-align: center;
    font-size: 14px;
    color: #777;
}

/* Responsive */
@media (max-width: 768px) {
    .contact {
        grid-template-columns: 1fr;
    }

    nav {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
    }

    .nav-links a {
        margin-left: 0;
        margin-right: 20px;
    }

    .contact h1 {
        font-size: 32px;
    }
}
</style>
</head>

<body>

<div class="container">

<nav>
    <div class="logo">
        <a href="index.html">
            <img src="images/logo.png" alt="Julia Schreier Logo">
        </a>
    </div>

    <div class="nav-links">
        <a href="index.html">Work</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<section class="contact">

<div>
    <h1>Contact</h1>
    <p>
    </p>

    <div class="contact-info">
        <p><strong>Email:</strong> schrj144@newschool.edu</p>
        <p><strong>Phone:</strong> +1 (332) 276-4334 </p>

        <p><strong>Location:</strong> New York, New York</p>
    </div>
</div>

<form action="https://formspree.io/f/xzznowoo" method="POST">
    <input type="text" name="name" placeholder="Your name" required>
    <input type="email" name="email" placeholder="Your email" required>
    <textarea name="message" placeholder="Your message" required></textarea>
    <button type="submit">Send Message</button>
</form>

</section>

<footer>
    © 2026 Julia Schreier — All Rights Reserved
</footer>

</div>

</body>
</html>
